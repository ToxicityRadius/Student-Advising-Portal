services:
  db:
    image: postgres:16-alpine
    container_name: student-advising-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_advising
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-advising-backend
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/student_advising
      DB_SSL: "false"
      CLIENT_URL: http://localhost:3000
      JWT_SECRET: dev_jwt_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_EXPIRE: 30m
      JWT_REFRESH_EXPIRE: 30d
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-advising-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_GOOGLE_CLIENT_ID: placeholder-client-id.apps.googleusercontent.com
      WDS_SOCKET_PORT: 0
    ports:
      - "3000:3000"

volumes:
  postgres_data:
